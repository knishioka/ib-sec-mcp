name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run bandit -c pyproject.toml -r ib_sec_mcp

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'schedule' && 1 || 0 }}

      # push/PR: scan new commits only (action default behaviour)
      - if: github.event_name != 'schedule'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # schedule: scan working tree only (skip history false-positives)
      - if: github.event_name == 'schedule'
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --no-git --source .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
